<style>
  .browse {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .search-box {
    display: flex;
    justify-content: center;
    margin-top: 20px;
  }

  input[type="text"] {
    width: 500px;
    padding: 10px 15px;
    font-size: 1.2em;
    border: 2px solid #ccc;
    border-radius: 15px 0 0 15px;
    outline: none;
  }

  .search-button {
    padding: 10px 20px;
    font-size: 1.2em;
    border: 2px solid #28a745;
    border-left: none;
    background-color: #28a745;
    color: #fff;
    border-radius: 0 15px 15px 0;
    cursor: pointer;
    outline: none;
  }

  .search-button:hover {
    background-color: #218838;
  }

  .me-button {
    padding: 10px 20px;
    font-size: 1.2em;
    border: 2px solid #28a745;
    border-left: none;
    background-color: #28a745;
    color: #fff;
    border-radius: 15px;
    cursor: pointer;
    outline: none;
  }

  .me-button:hover {
    background-color: #218838;
  }
</style>
<div class="browse">
  <h1>Browse GitHub Profiles</h1>
  <p>
    This website serves as a personal portfolio and a GitHub profile viewer,
    allowing users to explore GitHub profiles and showcase their own projects
    and skills.
  </p>
  <div class="search-box">
    <input id="searchInput" type="text" placeholder="Type a github pseudo..." />
    <button id="searchButton" class="search-button" type="button">Find</button>
  </div>
  <p>Quick link to my profile:</p>
  <button id="meButton" class="me-button">me</button>
</div>

<script>
  document
    .getElementById("searchButton")
    .addEventListener("click", function () {
      const input = document.getElementById("searchInput").value;
      if (input.trim() !== "") {
        fetch(`/new-username/${encodeURIComponent(input)}`, {
          method: "GET",
        })
          .then((response) => {
            if (response.ok) {
              return response.text();
            } else {
              throw new Error("Erreur lors de la recherche");
            }
          })
          .then(() => {
            location.reload();
          })
          .catch((error) => {
            console.error("Une erreur s'est produite:", error.message);
          });
      }
    });

  document.getElementById("meButton").addEventListener("click", function () {
    fetch("/new-username/tgrangeo", {
      method: "GET",
    })
      .then((response) => {
        if (response.ok) {
          return response.text();
        } else {
          throw new Error("Erreur lors de la récupération du profil");
        }
      })
      .then((data) => {
        location.reload();
      })
      .catch((error) => {
        alert(error.message);
      });
  });
</script>
