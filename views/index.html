  <video autoplay muted loop id="myVideo">
    <source src="./static/background.mp4" type="video/mp4">
  </video>
  <div class="side-menu">
      <ul>
        <li>
          <button class="side-menu-button" hx-get="/browse" hx-swap="innerHTML" hx-target="#content" hx-push-url="browse">
            <img src="../static/images/browse.png"/>
            <div class="text">Browse</div>
          </button>
        </li>
        <li>
          <button class="side-menu-button" id="meButton" hx-target="#content">
            <img src="../static/images/me.png"/>
            <div class="text">Me</div>
          </button>
        </li>
        <!-- <li>
          <button class="side-menu-button" hx-get="/blog" hx-swap="innerHTML" hx-target="#content" hx-push-url="blog">
            Blog
          </button>
        </li> -->
        <li>
          <button class="side-menu-button" hx-get="/contact" hx-swap="innerHTML" hx-target="#content" hx-push-url="contact">
            <img src="../static/images/email.png"/>
            <div class="text">Contact</div>
          </button>
        </li>
      </ul>
      <div class="line"></div>
  </div>
  <div class="page">
    <div id="header" class="header">
      <div>
        <div class="user-title"  hx-get="/browse" hx-swap="innerHTML" hx-target="#content" hx-push-url="browse">
          <div
            id="profile-picture-container"
            hx-get="/profile-picture"
            hx-trigger="load"
            hx-target="#profile-picture"
            hx-swap="outerHTML"
          >
            <img
              id="profile-picture"
              class="profile-picture"
              width="70px"
              src="static/placeholder.png"
              alt="Profile"
            />
          </div>
          <h1
            id="username"
            class="title"
            hx-get="/username"
            hx-target="#username"
            hx-swap="innerHTML"
            hx-trigger="load"
          >
            username
          </h1>
        </div>
      </div>
      <div class="menu" id="menu">
          <button
            hx-get="/about"
            hx-push-url="/about" 
            hx-swap="innerHTML"
            hx-target="#content"
          >
            About
          </button>
          <button
            hx-get="/projects"
            hx-push-url="/projects" 
            hx-swap="innerHTML"
            hx-target="#content"
          >
            Projects
          </button>
      </div>
      <div></div>
    </div>
    <div
      id="content"
      class="content"
      >{{.Content}}</div>
  </div>

<script>
  document.getElementById("meButton").addEventListener("click", function () {
    fetch("/new-username/tgrangeo", {
      method: "GET",
    })
      .then((response) => {
        if (response.ok) {
          return response.text();
        } else {
          throw new Error("Erreur lors de la récupération du profil");
        }
      })
      .then((data) => {
        location.reload();
        window.location.href = "/about";
      })
      .catch((error) => {
        alert(error.message);
      });
  });
</script>
